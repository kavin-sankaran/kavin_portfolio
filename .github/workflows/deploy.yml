name: Build and Deploy Angular to GitHub Pages

on:
  push:
    branches:
      - main # Change this to 'master' if your default branch is master

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24' # Upgraded to Node 24 to clear the deprecation warning
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Build Application
        # Force production configuration explicitly and handle fallback
        run: npx ng build --configuration production --base-href /${{ github.event.repository.name }}/

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: dist/kavin_portfolio/browser
          branch: gh-pages
