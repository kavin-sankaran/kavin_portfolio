name: Build and Deploy Angular to GitHub Pages

on:
  push:
    branches:
      - main # Change this to 'master' if your default branch is master

permissions:
  contents: write # Allows the workflow to create and update the gh-pages branch

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.19.5' # Matches your exact local Node version
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Build Application
        # Replace <YOUR_REPO_NAME> with your actual GitHub repository name (e.g., /my-portfolio/)
        run: npx ng build --configuration production --base-href /<YOUR_REPO_NAME>/

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: dist/kavin_portfolio/browser # The directory where your production code compiles
          branch: gh-pages # The branch the action will deploy to
