name: Deploy Angular to GitHub Pages

on:
  push:
    branches: [ main ]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          
      - name: Install deps
        run: npm ci
        
      - name: Build
        # Dynamically injects the base-href matching your exact repository name
        run: npx ng build --configuration production --base-href "/kavin_portfolio/"
        
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Angular 18 Fix: Removed the "/browser" suffix
          path: ./dist/kavin_portfolio
          
  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
