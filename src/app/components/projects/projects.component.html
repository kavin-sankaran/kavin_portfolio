<section id="projects" class="py-5 bg-light">
  <div class="container">
    <h2 class="text-center fw-bold mb-5">Projects</h2>
    <div class="row g-4">
      <div class="col-md-6 col-lg-4" *ngFor="let project of projects">
        <div class="card h-100 border-0 shadow-sm transition-card">
          <div class="card-body p-4 d-flex flex-column">
            <span
              class="text-primary fw-bold text-uppercase small mb-2 d-block"
              >{{ project.type }}</span
            >
            <h3 class="h5 fw-bold card-title mb-3">{{ project.title }}</h3>
            <p class="card-text text-secondary small flex-grow-1">
              {{ project.description }}
            </p>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>
