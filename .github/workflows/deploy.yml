name: Deploy Angular to GitHub Pages

on:
  push:
    branches: [ main ]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    # Forces the runner to allow Node 20 execution despite the deprecation rules
    env:
      ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20' # Keeps your required Node 20 environment
          cache: 'npm'
          
      - name: Install Dependencies
        run: npm ci
        
      - name: Build Application
        run: npx ng build --configuration production --base-href "/kavin_portfolio/"
        
      - name: Upload Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist/kavin_portfolio
          
  deploy:
    needs: build
    runs-on: ubuntu-latest
    # Forces the deploy job environment runner to also accept Node 20 actions
    env:
      ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
