<section id="experience" class="py-5 bg-white">
  <div class="container">
    <h2 class="text-center fw-bold mb-5">Professional Experience</h2>
    <div class="row justify-content-center">
      <div class="col-lg-10" *ngFor="let job of workHistory">
        <div class="card border-start border-primary border-4 shadow-sm mb-4">
          <div class="card-body p-4">
            <div
              class="d-flex flex-column flex-md-row justify-content-between align-items-md-center mb-3"
            >
              <div>
                <h3 class="h4 fw-bold mb-1">{{ job.role }}</h3>
                <h4 class="h5 text-muted mb-0">
                  {{ job.company }} — <small>{{ job.location }}</small>
                </h4>
              </div>
              <span
                class="badge bg-primary px-3 py-2 my-2 my-md-0 align-self-start align-self-md-center"
              >
                {{ job.tenure }}
              </span>
            </div>
            <ul class="list-unstyled mb-0">
              <li
                class="mb-2 text-secondary position-relative ps-4"
                *ngFor="let point of job.highlights"
              >
                <i
                  class="bi bi-check-circle-fill text-primary position-absolute start-0 top-0 mt-1"
                ></i>
                {{ point }}
              </li>
            </ul>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>
